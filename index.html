<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirit Mask Booth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Cinzel:wght@700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--ink:#1a1a2e;--teal:#4ECDC4;--cream:#f5f0e8;--gold:#c9a84c;}
  body{background:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Noto Serif SC',serif;color:var(--cream);overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1e3a5f44 0%,transparent 70%);pointer-events:none;}
  header{padding:1.5rem 1rem 0.5rem;text-align:center;}
  header h1{font-family:'Cinzel',serif;font-size:clamp(1.4rem,5vw,2.2rem);letter-spacing:.12em;color:var(--cream);text-shadow:0 0 30px var(--teal);}
  header p{margin-top:.4rem;font-size:.82rem;color:#aaa;letter-spacing:.06em;}
  .divider{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.6rem auto 0;}
  .stage{position:relative;width:min(480px,96vw);aspect-ratio:3/4;margin:1rem auto;border-radius:18px;overflow:hidden;box-shadow:0 0 0 1px #ffffff18,0 20px 60px #00000088;background:#0d0d1a;}
  #videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  #mainCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .overlay-hint{position:absolute;bottom:1rem;left:0;right:0;text-align:center;font-size:.75rem;color:rgba(255,255,255,.5);pointer-events:none;transition:opacity .4s;}
  .controls{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;padding:0 1rem .8rem;max-width:480px;width:100%;margin:0 auto;}
  button{font-family:'Noto Serif SC',serif;font-size:.82rem;letter-spacing:.05em;padding:.5rem 1.2rem;border:1px solid #ffffff30;border-radius:40px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.08);color:var(--cream);}
  button:hover{background:rgba(78,205,196,.2);border-color:var(--teal);}
  button.primary{background:linear-gradient(135deg,#4ECDC4,#2a9d8f);border:none;color:#fff;font-weight:700;box-shadow:0 4px 20px #4ECDC455;}
  button.primary:hover{filter:brightness(1.15);transform:translateY(-1px);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .status-bar{text-align:center;font-size:.78rem;color:var(--teal);min-height:1.4rem;letter-spacing:.05em;padding-bottom:.3rem;}
  .snapshot-strip{display:flex;gap:.6rem;padding:0 1rem 2rem;overflow-x:auto;max-width:480px;width:100%;margin:0 auto;}
  .snapshot-strip img{height:80px;border-radius:8px;border:1px solid #ffffff22;cursor:pointer;transition:transform .2s;flex-shrink:0;}
  .snapshot-strip img:hover{transform:scale(1.06);border-color:var(--teal);}
  #loadingOverlay{position:fixed;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem;transition:opacity .5s;}
  #loadingOverlay.hidden{opacity:0;pointer-events:none;}
  .loader-ring{width:52px;height:52px;border:3px solid #ffffff18;border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader-text{font-size:.85rem;color:#aaa;letter-spacing:.1em;}
</style>
</head>
<body>
<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loadingText">Loading…</div>
</div>
<header>
  <h1>Spirit Mask Booth</h1>
  <p>幻 · Face Detection Cosplay Filter</p>
  <div class="divider"></div>
</header>
<div class="stage">
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="mainCanvas"></canvas>
  <div class="overlay-hint" id="hint">Align your face in the frame</div>
</div>
<div class="status-bar" id="statusBar">Starting…</div>
<div class="controls">
  <button id="btnSnap" class="primary" disabled>📸 Capture</button>
  <button id="btnToggleMask">🎭 Toggle Mask</button>
  <button id="btnMirror">↔ Mirror</button>
  <button id="btnDownload" disabled>⬇ Save Last</button>
</div>
<div class="snapshot-strip" id="strip"></div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

// ── Gray circle geometry (pixel-measured from HEIF mask) ──────────────────
// Pure gray circle: rows 543-1095 of 1477H, cols 177-811 of 954W
// Center: (494px, 819px) = (0.5178W, 0.5545H)
// Size: 634w x 552h  =>  0.6646W x 0.3737H
const HOLE_CY_FRAC = 0.5545;   // hole center Y as fraction of mask height
const HOLE_CX_FRAC = 0.5178;   // hole center X as fraction of mask width
const HOLE_H_FRAC  = 0.3737;   // hole height as fraction of mask height
const HOLE_W_FRAC  = 0.6646;   // hole width as fraction of mask width

let video, canvas, ctx;
let maskImg = new Image(), lBrowImg = new Image(), rBrowImg = new Image();
let modelsLoaded = false;
let showMask = true, mirrored = true;
let lastBlob = null, detections = null, frameCount = 0;

window.addEventListener('DOMContentLoaded', async () => {
  video  = document.getElementById('videoEl');
  canvas = document.getElementById('mainCanvas');
  ctx    = canvas.getContext('2d');

  document.getElementById('btnSnap').addEventListener('click', takeSnapshot);
  document.getElementById('btnToggleMask').addEventListener('click', () => { showMask = !showMask; });
  document.getElementById('btnMirror').addEventListener('click', () => {
    mirrored = !mirrored;
    video.style.transform = mirrored ? 'scaleX(-1)' : 'none';
  });
  document.getElementById('btnDownload').addEventListener('click', downloadLast);

  maskImg.src = MASK_SRC; lBrowImg.src = LEFT_BROW_SRC; rBrowImg.src = RIGHT_BROW_SRC;
  await Promise.all([maskImg,lBrowImg,rBrowImg].map(i=>new Promise(r=>{i.onload=r;i.onerror=r;})));

  document.getElementById('loadingText').textContent = 'Loading face models…';
  for (const url of [
    'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model',
    'https://justadudewhohacks.github.io/face-api.js/models'
  ]) {
    try {
      await faceapi.nets.tinyFaceDetector.loadFromUri(url);
      await faceapi.nets.faceLandmark68TinyNet.loadFromUri(url);
      modelsLoaded = true; break;
    } catch(e) {}
  }

  document.getElementById('loadingText').textContent = 'Starting camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} }, audio:false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('btnSnap').disabled = false;
      document.getElementById('statusBar').textContent = modelsLoaded ? '✨ Ready!' : '⚠ No face detection';
      startLoop();
    };
  } catch(e) {
    document.getElementById('loadingText').textContent = '⚠ Camera access denied.';
  }
});

function startLoop() {
  (function loop(){
    requestAnimationFrame(loop);
    renderFrame();
    if (++frameCount % 6 === 0 && modelsLoaded) detectFace();
  })();
}

async function detectFace() {
  try {
    const r = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({inputSize:256, scoreThreshold:0.35}))
      .withFaceLandmarks(true);
    detections = r || null;
    document.getElementById('hint').style.opacity    = detections ? '0' : '1';
    document.getElementById('statusBar').textContent = detections ? '✨ Spirit detected!' : 'Looking for a face…';
  } catch(e){ detections = null; }
}

function renderFrame() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (mirrored) { ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.drawImage(video, 0, 0, W, H);
  ctx.restore();
  if (!showMask) return;
  if (detections) drawOverlays(detections, W, H);
  else             drawCentered(W, H);
}

function drawOverlays(det, W, H) {
  const lms = det.landmarks;
  const mx  = pt => mirrored ? {x: W - pt.x, y: pt.y} : pt;

  const jaw = lms.getJawOutline().map(mx);
  const lb  = lms.getLeftEyeBrow().map(mx);
  const rb  = lms.getRightEyeBrow().map(mx);

  // ── Face bounding box: forehead top → chin bottom ─────────────────────
  const browTopY  = Math.min(...[...lb,...rb].map(p => p.y));
  const jawBotY   = jaw[8].y;
  const browToJaw = jawBotY - browTopY;
  const faceTop   = browTopY - browToJaw * 0.52;
  const faceBot   = jawBotY  + browToJaw * 0.04;
  const faceH     = faceBot - faceTop;
  const faceCX    = (jaw[0].x + jaw[16].x) / 2;
  const faceCY    = (faceTop + faceBot) / 2;

  // ── 1. Mask: scale so gray circle exactly contains the face ───────────
  // face should fit inside circle: use the smaller of H/W ratios
  // circle is 0.3737H tall, 0.6646W wide in the mask
  // We want faceH ≈ 90% of circle height → scale mask accordingly
  if (maskImg.naturalWidth > 0) {
    const maskH = (faceH * 0.95) / HOLE_H_FRAC;
    const maskW = maskH * (maskImg.naturalWidth / maskImg.naturalHeight);
    // Position: hole center aligns to faceCY, hole centerX aligns to faceCX
    const maskX = faceCX - maskW * HOLE_CX_FRAC;
    const maskY = faceCY - maskH * HOLE_CY_FRAC;
    ctx.drawImage(maskImg, maskX, maskY, maskW, maskH);
  }

  // ── 2. Eyebrows: same size, symmetrical, centered on each brow ────────
  // Compute a uniform brow width based on the wider of the two brows
  const lbW = Math.abs(lb[lb.length-1].x - lb[0].x);
  const rbW = Math.abs(rb[rb.length-1].x - rb[0].x);
  const browW = Math.max(lbW, rbW) * 1.5; // uniform size + padding
  const browH = browW * (lBrowImg.naturalHeight / lBrowImg.naturalWidth);

  // Left brow center
  const lbCX = avg(lb.map(p=>p.x));
  const lbCY = avg(lb.map(p=>p.y));
  // Right brow center  
  const rbCX = avg(rb.map(p=>p.x));
  const rbCY = avg(rb.map(p=>p.y));

  // Draw both at same size, centered on each brow's landmark centroid
  ctx.drawImage(lBrowImg, lbCX - browW/2, lbCY - browH*0.55, browW, browH);
  ctx.drawImage(rBrowImg, rbCX - browW/2, rbCY - browH*0.55, browW, browH);
}

function drawCentered(W, H) {
  if (!maskImg.naturalWidth) return;
  const ar = maskImg.naturalWidth / maskImg.naturalHeight;
  const mh = H * 0.92, mw = mh * ar;
  ctx.drawImage(maskImg, (W-mw)/2, H*0.02, mw, mh);
}

function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

function takeSnapshot() {
  canvas.toBlob(blob => {
    lastBlob = blob;
    document.getElementById('btnDownload').disabled = false;
    const url = URL.createObjectURL(blob);
    const strip = document.getElementById('strip');
    const img = document.createElement('img');
    img.src = url;
    img.addEventListener('click',()=>{const a=document.createElement('a');a.href=url;a.download=`spirit_${Date.now()}.png`;a.click();});
    strip.appendChild(img); strip.scrollLeft=strip.scrollWidth;
    canvas.style.filter='brightness(2)'; setTimeout(()=>canvas.style.filter='',120);
  },'image/png');
}
function downloadLast() {
  if (!lastBlob) return;
  const a=document.createElement('a');a.href=URL.createObjectURL(lastBlob);a.download=`spirit_mask_${Date.now()}.png`;a.click();
}
